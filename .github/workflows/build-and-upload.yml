name: Build and Package All Images (Split)
on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and save all images
        run: |
          # Pull dependencies
          docker pull postgres:16.2-bookworm
          docker pull clickhouse/clickhouse-server:24.5.1.1763-alpine
          
          # Build langtrace from local Dockerfile
          docker build -t langtrace-local .

          # Save all to tar files
          docker save postgres:16.2-bookworm -o postgres.tar
          docker save clickhouse/clickhouse-server:24.5.1.1763-alpine -o clickhouse.tar
          docker save langtrace-local:latest -o langtrace.tar

      - name: Split each tar into 100MB chunks and compress
        run: |
          # 压缩并分割每个 tar 文件（每份 ≤100MB）
          for file in *.tar; do
            echo "Processing $file..."
            gzip "$file"                         
            split -b 100M "${file}.gz" "${file%.*}-part-" 
            rm "${file}.gz"                       # 
          done

      - name: Upload all split parts
        uses: actions/upload-artifact@v4
        with:
          name: langtrace-full-package-split
          path: |
            postgres-part-*
            clickhouse-part-*
            langtrace-part-*
