name: Build and Package All Images (True Split)
on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and save all images
        run: |
          docker pull postgres:16.2-bookworm
          docker pull clickhouse/clickhouse-server:24.5.1.1763-alpine
          docker build -t langtrace-local .
          docker save postgres:16.2-bookworm -o postgres.tar
          docker save clickhouse/clickhouse-server:24.5.1.1763-alpine -o clickhouse.tar
          docker save langtrace-local:latest -o langtrace.tar

      - name: Compress and split into 100MB parts (as .zip segments)
        run: |
          # 将每个镜像压缩后分割成 100MB 的 zip 分卷
          for img in postgres clickhouse langtrace; do
            echo "Splitting $img.tar..."
            zip -s 100m "${img}.zip" "${img}.tar"
            rm "${img}.tar"  # 清理原始 tar
          done

      - name: Upload all split zip segments
        uses: actions/upload-artifact@v4
        with:
          name: langtrace-split-zip-parts
          path: |
            postgres.zip
            postgres.z*
            clickhouse.zip
            clickhouse.z*
            langtrace.zip
            langtrace.z*
          if-no-files-found: error
