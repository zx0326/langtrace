name: Build and Package All Images (Split)
on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and save all images
        run: |
          docker pull postgres:16.2-bookworm
          docker pull clickhouse/clickhouse-server:24.5.1.1763-alpine
          docker build -t langtrace-local .
          docker save postgres:16.2-bookworm -o postgres.tar
          docker save clickhouse/clickhouse-server:24.5.1.1763-alpine -o clickhouse.tar
          docker save langtrace-local:latest -o langtrace.tar

      - name: Compress and split into 100MB parts
        run: |
          # 压缩并分割每个 tar
          for img in postgres clickhouse langtrace; do
            gzip "${img}.tar"
            split -b 100M "${img}.tar.gz" "${img}-part-"
            rm "${img}.tar.gz"  # 清理中间文件
          done

      - name: Upload split parts as separate files (NO ZIP!)
        uses: actions/upload-artifact@v4
        with:
          name: langtrace-full-package-parts
          path: |
            postgres-part-*
            clickhouse-part-*
            langtrace-part-*
          if-no-files-found: error
          # 关键：不启用 compression，让每个 part 独立上传
