name: Build and Upload Langtrace Image
on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Langtrace image
        run: |
          docker build -t langtrace-local .

      - name: Save image to tar
        run: |
          docker save langtrace-local:latest -o langtrace.tar

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: langtrace-image
          path: langtrace.tar
